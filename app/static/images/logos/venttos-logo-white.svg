<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 135" width="460" height="135">
  <!--
    Venttos Electronics — Logo Vetorial
    Fundo: TRANSPARENTE
    Cor: Branco puro (ideal para fundos azuis/escuros)
  -->

  <!-- ===== ÍCONE "V" ESTILIZADO ===== -->
  <!-- Lado esquerdo do V (bloco diagonal esquerdo) -->
  <polygon points="8,12  50,12  50,98  34,98" fill="white"/>

  <!-- Lado direito do V (diagonal para baixo direita) -->
  <polygon points="50,98  34,98  90,12  106,12" fill="white"/>

  <!-- Triângulo interno de destaque (era azul no original) -->
  <polygon points="50,12  106,12  50,98" fill="white" opacity="0.55"/>

  <!-- ===== TEXTO "enttos" (o V já é o ícone) ===== -->
  <text
    x="114"
    y="91"
    font-family="'Arial Black', 'Franklin Gothic Heavy', Impact, 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="78"
    fill="white"
    letter-spacing="-2"
  >enttos</text>

  <!-- ===== SUBTÍTULO "Electronics" ===== -->
  <text
    x="225"
    y="120"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="17"
    fill="white"
    letter-spacing="4.5"
    text-anchor="middle"
  >Electronics</text>

</svg>
