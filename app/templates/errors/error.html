<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ titulo }} · FactoryOps</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 24px;
    }

    .error-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.30);
    }

    .error-icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 24px;
    }

    .error-icon-wrap.danger  { background: rgba(220, 53, 69, 0.10); color: #dc3545; }
    .error-icon-wrap.warning { background: rgba(255, 193, 7, 0.12);  color: #ca8a04; }
    .error-icon-wrap.info    { background: rgba(13, 110, 253, 0.10); color: #0d6efd; }

    .error-code {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .error-message {
      font-size: 0.9rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .logo-wrap {
      margin-bottom: 32px;
    }

    .logo-wrap img {
      height: 32px;
      opacity: 0.6;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>

  <div class="error-card">
    <div class="logo-wrap">
      <img src="/static/images/logos/logo.png" alt="FactoryOps" onerror="this.style.display='none'">
    </div>

    <div class="error-icon-wrap {{ nivel }}">
      <i class="bi bi-{{ icone }}"></i>
    </div>

    <div class="error-code">Erro {{ codigo }}</div>
    <div class="error-title">{{ titulo }}</div>
    <div class="error-message">{{ mensagem }}</div>

    {% if mostrar_voltar %}
    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm me-2">
      <i class="bi bi-arrow-left me-1"></i>Voltar
    </a>
    {% endif %}
    <a href="/" class="btn btn-primary btn-sm">
      <i class="bi bi-house me-1"></i>Início
    </a>
  </div>

  <div class="footer-note">FactoryOps · Sistema de Gestão Industrial</div>

</body>
</html>
