<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Erro{% endblock %} · Venttos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: rgba(15,23,42,0.09);
      --primary: #0d6efd;
      --sidebar-bg: #0f172a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }
    .error-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .error-icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
    }
    .error-code {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .error-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--sidebar-bg);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-home:hover { opacity: 0.85; color: #fff; }
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 20px;
      font-size: 0.88rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s;
      margin-left: 10px;
    }
    .btn-refresh:hover { background: var(--bg); color: var(--text); }
    .logo-bar {
      margin-bottom: 32px;
      opacity: 0.6;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="logo-bar">VENTTOS · FACTORYOPS</div>
    {% block body %}{% endblock %}
  </div>
</body>
</html>
