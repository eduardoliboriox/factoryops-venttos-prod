{% extends "layouts/auth.html" %}
{% block title %}Entrar{% endblock %}
{% block content %}
<section class="mobile-screen login-form"
  style="background-image:url('{{ url_for('static', filename='images/banners/bg-log-pass.webp') }}')">

  <form method="post"
        action="{{ url_for('auth.login_local') }}"
        class="mobile-form">
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} text-center py-2 mb-3">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <button
      id="install-app-btn"
      type="button"
      class="btn btn-outline-light w-100 mb-3 d-none d-inline-flex align-items-center justify-content-center gap-2"
      aria-hidden="true"
    >
      <img
        src="{{ url_for('static', filename='images/logos/pwa-192.png') }}"
        alt="FactoryOps"
        width="18"
        height="18"
        style="border-radius:4px;"
      >
      <span>Instalar aplicativo</span>
    </button>

    <div class="input-group mb-3 auth-input">
      <span class="input-group-text">
        <i class="bi bi-person"></i>
      </span>
      <input name="username" class="form-control" placeholder="Usuário" required>
    </div>

    <div class="input-group mb-3 auth-input">
      <span class="input-group-text">
        <i class="bi bi-lock"></i>
      </span>
      <input type="password"
             id="login-password"
             name="password"
             class="form-control"
             placeholder="Senha"
             required>
      <button type="button"
              class="input-group-text btn-toggle-password"
              data-toggle-password="login-password">
        <i class="bi bi-eye"></i>
      </button>
    </div>

    <button class="btn btn-primary w-100 mb-3">
      Entrar
    </button>

    <div class="text-center mb-3">
      <a href="{{ url_for('auth.forgot_password') }}"
         class="btn btn-link p-0">
        Esqueci minha senha
      </a>
    </div>

    <div class="auth-acesso-via">
      <span>ou continue com</span>
    </div>

    <div class="d-flex justify-content-center gap-3 mt-2">
      <a href="{{ url_for('auth.login_google') }}"
         class="btn-social-circle btn-social-google"
         title="Entrar com Google">
        <i class="bi bi-google"></i>
      </a>
      <a href="{{ url_for('auth.login_github') }}"
         class="btn-social-circle btn-social-github"
         title="Entrar com GitHub">
        <i class="bi bi-github"></i>
      </a>
    </div>

  </form>
</section>
<script src="{{ url_for('static', filename='js/input-masks.js') }}?v={{ APP_VERSION }}"></script>
{% endblock %}
