{% extends "layouts/app.html" %}
{% block title %}SMT · Modelos{% endblock %}

{% block page_title %}
<div class="d-flex align-items-center w-100">
  <span class="me-auto">
   SMT Manager - Modelos
  </span>

  <div class="ms-auto d-flex gap-2">
    <a href="{{ url_for('pages.inicio') }}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Voltar
    </a>

    <button class="btn btn-outline-purple"
            type="button"
            onclick="toggleFullscreen()">
      <i class="bi bi-arrows-fullscreen"></i>
    </button>

    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-danger">
      <i class="bi bi-box-arrow-right"></i> Sair
    </a>
  </div>
</div>
{% endblock %}

{% block content %}
<div class="container-fluid">

  <div id="mensagemModelos"></div>

  <div class="card mb-4 p-3 shadow-sm">
    <h5 class="mb-3 text-success">
      <i class="bi bi-table text-success"></i> Modelos Cadastrados
    </h5>

    <div class="d-flex gap-2 mb-3">
      <a href="#editar-modelo" class="btn btn-warning btn-sm fw-bold text-white">
        <i class="bi bi-pencil-square text-white"></i> Editar Modelo
      </a>

      <a href="#excluir-modelo" class="btn btn-danger btn-sm fw-bold">
        <i class="bi bi-trash3"></i> Excluir Modelo
      </a>
    </div>

    <input
      id="buscaModelo"
      class="form-control mb-3"
      placeholder="🔎 Buscar por código, cliente, setor ou linha"
    >

    <div id="listaModelos" class="row g-3"></div>
  </div>

  <div id="editar-modelo" class="card mb-4 p-3 shadow-sm">
    <h5 class="mb-3 text-warning">
      <i class="bi bi-pencil-square"></i> Editar Modelo
    </h5>

    <form id="editarForm" class="row g-3">

      <div class="col-md-3">
        <label class="form-label fw-bold">Cliente</label>
        <select class="form-select" id="filtroCliente">
          <option value="">Selecione</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold">Modelo (código + fase + linha)</label>
        <select class="form-select" name="modelo" id="selectEditar" required>
          <option value="">Selecione o cliente primeiro</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label fw-bold">Nova Meta/Hora</label>
        <input class="form-control" name="meta_padrao" type="number" step="0.01"
               placeholder="Deixe vazio para manter">
      </div>

      <div class="col-md-3">
        <label class="form-label fw-bold">Novo Tempo de Montagem (s)</label>
        <input class="form-control" name="tempo_montagem" type="number" step="0.01"
               placeholder="Deixe vazio para manter">
      </div>

      <div class="col-md-3">
        <label class="form-label fw-bold">Placas por blank</label>
        <input class="form-control" name="blank" type="number" min="1"
               placeholder="Deixe vazio para manter">
      </div>

      <div class="col-md-3">
        <label class="form-label fw-bold">Corrigir Código (opcional)</label>
        <input class="form-control" name="novo_codigo" type="text"
               placeholder="Só se digitou errado">
      </div>

      <div class="col-md-12">
        <button class="btn btn-warning w-100 fw-bold text-white">Atualizar</button>
      </div>

    </form>
  </div>

  <div id="excluir-modelo" class="card mb-4 p-3 shadow-sm">
    <h5 class="mb-3 text-danger">
      <i class="bi bi-trash3 fw-bold"></i> Excluir Modelo
    </h5>

    <form id="excluirForm" class="row g-3">

      <div class="col-md-3">
        <label class="form-label fw-bold">Cliente</label>
        <select class="form-select" id="filtroClienteExcluir">
          <option value="">Selecione</option>
        </select>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-bold">Modelo (código + fase + linha)</label>
        <select class="form-select" name="modelo" id="selectExcluir" required>
          <option value="">Selecione o cliente primeiro</option>
        </select>
      </div>

      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-danger w-100 fw-bold text-white">Excluir</button>
      </div>
    </form>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const elLista = document.getElementById('listaModelos');
  const elBusca = document.getElementById('buscaModelo');

  const elFiltroCliente = document.getElementById('filtroCliente');
  const elSelectEditar = document.getElementById('selectEditar');

  const elFiltroClienteExcluir = document.getElementById('filtroClienteExcluir');
  const elSelectExcluir = document.getElementById('selectExcluir');

  const elMsg = document.getElementById('mensagemModelos');
  const formEditar = document.getElementById('editarForm');
  const formExcluir = document.getElementById('excluirForm');

  let modelosCache = [];

  function showMessage(texto, tipo='success') {
    const div = document.createElement('div');
    div.className = `alert alert-${tipo} alert-dismissible fade show`;
    div.role = 'alert';
    div.innerHTML = `
      ${texto}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    `;

    elMsg.innerHTML = '';
    elMsg.appendChild(div);

    setTimeout(() => {
      const bsAlert = bootstrap.Alert.getOrCreateInstance(div);
      bsAlert.close();
    }, 2000);
  }

  function escapeHtml(s) {
    return String(s ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function renderCards(data) {
    elLista.innerHTML = '';

    if (!data || !data.length) {
      elLista.innerHTML = '<p class="text-muted mb-0">Nenhum modelo cadastrado.</p>';
      return;
    }

    const frag = document.createDocumentFragment();

    data.forEach(m => {
      const col = document.createElement('div');
      col.className = 'col-md-4 col-lg-3';

      const tempo = (m.tempo_montagem ?? '-');
      const meta = (m.meta ?? 0);

      col.innerHTML = `
        <div class="card-modelo shadow-sm">
          <div class="d-flex justify-content-between">
            <div class="codigo">${escapeHtml(m.codigo)}</div>
            <div class="cliente">${escapeHtml(m.cliente)}</div>
          </div>

          <div class="linha"><strong>Setor:</strong> ${escapeHtml(m.setor)}</div>
          <div class="linha"><strong>Linha:</strong> ${escapeHtml(m.linha)}</div>
          <div class="linha"><strong>Meta/hora:</strong> ${escapeHtml(meta)}</div>
          <div class="linha"><strong>Tempo de montagem:</strong> ${escapeHtml(tempo)} s</div>
          <div class="linha"><strong>Placas por blank:</strong> ${escapeHtml(m.blank)}</div>
          <div class="linha"><strong>Fase:</strong> ${escapeHtml(m.fase)}</div>
        </div>
      `;

      frag.appendChild(col);
    });

    elLista.appendChild(frag);
  }

  function fillClienteSelects() {
    const clientes = Array.from(new Set((modelosCache || []).map(m => m.cliente).filter(Boolean))).sort();

    elFiltroCliente.innerHTML = '<option value="">Selecione</option>';
    elFiltroClienteExcluir.innerHTML = '<option value="">Selecione</option>';

    for (const c of clientes) {
      const o1 = document.createElement('option');
      o1.value = c;
      o1.textContent = c;
      elFiltroCliente.appendChild(o1);

      const o2 = document.createElement('option');
      o2.value = c;
      o2.textContent = c;
      elFiltroClienteExcluir.appendChild(o2);
    }
  }

  function fillModelSelect(selectEl, cliente) {
    selectEl.innerHTML = '';

    if (!cliente) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'Selecione o cliente primeiro';
      selectEl.appendChild(opt);
      return;
    }

    const modelos = (modelosCache || []).filter(m => m.cliente === cliente);

    if (!modelos.length) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'Nenhum modelo para este cliente';
      selectEl.appendChild(opt);
      return;
    }

    const first = document.createElement('option');
    first.value = '';
    first.textContent = 'Selecione';
    selectEl.appendChild(first);

    for (const m of modelos) {
      const opt = document.createElement('option');
      opt.value = `${m.codigo}|${m.fase}|${m.linha}`;
      opt.textContent = `${m.codigo} — ${m.fase} — ${m.linha}`;
      selectEl.appendChild(opt);
    }
  }

  function applySearchFilter() {
    const termo = (elBusca.value || '').toLowerCase().trim();
    const cols = elLista.querySelectorAll('.col-md-4, .col-lg-3');

    cols.forEach(col => {
      const ok = col.textContent.toLowerCase().includes(termo);
      col.style.display = ok ? '' : 'none';
    });
  }

  async function loadModelos() {
    try {
      const r = await fetch('/api/modelos', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
      if (!r.ok) throw new Error('Falha ao buscar modelos');

      const data = await r.json();
      modelosCache = Array.isArray(data) ? data : [];

      renderCards(modelosCache);
      fillClienteSelects();
      fillModelSelect(elSelectEditar, elFiltroCliente.value);
      fillModelSelect(elSelectExcluir, elFiltroClienteExcluir.value);

      applySearchFilter();
    } catch (e) {
      modelosCache = [];
      elLista.innerHTML = '<p class="text-danger mb-0">Erro ao carregar modelos.</p>';
    }
  }

  elBusca.addEventListener('input', applySearchFilter);

  elFiltroCliente.addEventListener('change', () => {
    fillModelSelect(elSelectEditar, elFiltroCliente.value);
  });

  elFiltroClienteExcluir.addEventListener('change', () => {
    fillModelSelect(elSelectExcluir, elFiltroClienteExcluir.value);
  });

  formEditar.addEventListener('submit', async (e) => {
    e.preventDefault();

    const fd = new FormData(formEditar);
    const modelo = fd.get('modelo');

    if (!modelo) {
      showMessage('Selecione um modelo para editar.', 'warning');
      return;
    }

    const parts = String(modelo).split('|');
    const codigo = parts[0] || '';
    const fase = parts[1] || '';
    const linha = parts[2] || '';

    fd.append('codigo', codigo);
    fd.append('fase', fase);
    fd.append('linha', linha);
    fd.delete('modelo');

    const r = await fetch('/api/modelos', { method: 'PUT', body: fd });
    const data = await r.json();

    showMessage(data.mensagem || 'Modelo atualizado.', data.sucesso ? 'success' : 'danger');
    await loadModelos();
  });

  formExcluir.addEventListener('submit', async (e) => {
    e.preventDefault();

    const fd = new FormData(formExcluir);
    const modelo = fd.get('modelo');

    if (!modelo) {
      showMessage('Selecione um modelo para excluir.', 'warning');
      return;
    }

    const parts = String(modelo).split('|');
    const codigo = parts[0] || '';
    const fase = parts[1] || '';
    const linha = parts[2] || '';

    fd.append('codigo', codigo);
    fd.append('fase', fase);
    fd.append('linha', linha);
    fd.delete('modelo');

    const r = await fetch('/api/modelos', { method: 'DELETE', body: fd });
    const data = await r.json();

    showMessage(data.mensagem || 'Modelo excluído.', data.sucesso ? 'danger' : 'warning');
    await loadModelos();
  });

  loadModelos();
});
</script>
{% endblock %}
